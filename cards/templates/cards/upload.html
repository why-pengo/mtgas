<!DOCTYPE html>
<html>
<head><title>Upload MTG Card</title></head>
<body>
  <h1>Upload a Card Image</h1>
  {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="image" accept="image/*" required>
    <br><br>
    <button type="submit">Upload and Match</button>
  </form>
  <p><em>One card per image. The image will be matched against the Scryfall database.</em></p>
</body>
</html>
