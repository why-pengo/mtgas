{% extends "base.html" %}

{% block title %}Paper Cards — Upload{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Paper Cards</h1>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">Upload a Paper Card Image</h5>

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="image-input" class="form-label">Card image</label>
                        <input id="image-input" type="file" name="image" accept="image/*"
                               required class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        Upload &amp; Match
                    </button>
                </form>

                <p class="text-muted mt-3 mb-0">
                    <small>One card per image. The image will be matched against the Scryfall database.</small>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
